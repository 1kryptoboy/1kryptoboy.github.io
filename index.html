<html>
<head>
  <title>login portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Nunito:400,600,700" rel="stylesheet">
  <link rel="stylesheet" href="css/responsive_style.css" />
  <link rel="stylesheet" href="css/firebase_style.css" />
</head>
<body>

  <div class="topnav" id="myTopnav">
    <a href="index.html" class="active">login</a>
    <a href="user_info.html">user info</a>
    <a href="song_info.html">songs</a>
    <a href="javascript:void(0);" class="icon" onclick="myFunction()">
      <i class="fa fa-bars"></i>
    </a>
  </div>


  <div id="login_div" class="main-div">
    <h3>Audio Login Portal</h3>
    <input type="email" placeholder="Email..." id="email_field" />
    <input type="password" placeholder="Password..." id="password_field" />

    <button onclick="login()">Login to Account</button>
  </div>

  <div id="user_div" class="loggedin-div">
    <h3>Welcome</h3>
    <p id="user_para">Welcome to Firebase web login Example. You're currently logged in.</p>
    <button onclick="logout()">Logout</button>
  </div>
  
  <script src="https://www.gstatic.com/firebasejs/4.8.1/firebase.js"></script>
  <script src="scripts/firebase_initialization.js"></script>
  <script src="scripts/firebase_index.js"></script>

</body>
</html>
